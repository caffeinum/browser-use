name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check dependency graph availability
        id: dependency-graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status="$(curl --silent --show-error --location \
            --output /dev/null \
            --write-out '%{http_code}' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom")"

          if [ "${status}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "status=${status}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Dependency review
        if: steps.dependency-graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

      - name: Setup pnpm (fallback)
        if: steps.dependency-graph.outputs.enabled != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Use Node.js 22.x (fallback)
        if: steps.dependency-graph.outputs.enabled != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: pnpm

      - name: Install dependencies (fallback)
        if: steps.dependency-graph.outputs.enabled != 'true'
        run: pnpm install --frozen-lockfile
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Security audit fallback (high+)
        if: steps.dependency-graph.outputs.enabled != 'true'
        run: pnpm audit --audit-level high

      - name: Skip dependency review when dependency graph is unavailable
        if: steps.dependency-graph.outputs.enabled != 'true'
        run: |
          echo "::warning::Dependency Graph is unavailable (HTTP ${{ steps.dependency-graph.outputs.status }}); skipping dependency review."
